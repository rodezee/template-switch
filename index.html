<!doctype html>
<html lang="en">
  <head>
    <title>Template Switch</title>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="//unpkg.com/@picocss/pico">
    <script type="module" src="/template-switch.js"></script>
    <script src="//unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/reefjs@13/dist/reef.min.js"></script>
  </head>
  <body>
    <template-switch>
      <template id="ts-routes">
        <template path="/" title="Home">
          <hgroup>
            <h1>Welcome</h1>
            <p>This is a zero-dependency template router.</p>
          </hgroup>
          <hr>
          <p>This router uses native browser templates to define routes and layouts without a complex build step.</p>
          <p>To see this at work, click through the menu.</p>
          <hr>
          <hgroup>
            <h1>How it works!</h1>
            <code>
              ...
            </code>
          </hgroup>
        </template>

        <template path="/hello/:name" title="Greeting">
          <article>
            <header>Personal Greeting</header>
            <h3>Hello, {{ name }}!</h3>
            <p>This page was generated by matching the <code>:name</code> parameter in the URL.</p>
            <footer><a href="/users">Back to Users</a></footer>
          </article>
        </template>

        <template path="/profile/:firstname/:lastname" title="User Profile">
          <article>
            <nav aria-label="breadcrumb">
              <ul>
                <li><a href="/">Home</a></li>
                <li>User Profile</li>
              </ul>
            </nav>
            <h2>Profile: {{firstname}} {{lastname}}</h2>
            <div class="grid">
              <mark>Role: Administrator</mark>
              <mark>Status: Active</mark>
            </div>
          </article>
        </template>

        <template path="/users" title="User Directory">
          <h2>Our Team</h2>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>John Doe</td>
                <td><a href="/profile/John/Doe">View Profile</a></td>
              </tr>
              <tr>
                <td>Piere Lun</td>
                <td><a href="/profile/Piere/Lun">View Profile</a></td>
              </tr>
              <tr>
                <td>Jane Smith</td>
                <td><a href="/hello/Jane">Say Hi</a></td>
              </tr>
            </tbody>
          </table>
        </template>
        <template path="/counter/:start" title="Counter">
          <article>
            <header>Counter started at {{start}}</header>
            <p>Count: <strong id="display-{{start}}">{{start}}</strong></p>
            <button id="btn-{{start}}">Increment</button>
          </article>

          <script>
            // Because we use unique IDs like 'btn-{{start}}', 
            // multiple counters won't clash!
            (function() {
              let count = parseInt("{{start}}"); // Hardcoded magic!
              const display = document.getElementById("display-{{start}}");
              const btn = document.getElementById("btn-{{start}}");

              btn.onclick = () => {
                count++;
                display.textContent = count;
              };
            })();
          </script>
        </template>
        <template path="/todo" title="Todo">
          <article x-data="todoApp()">
            <header>
              <h3>Todo List</h3>
              <div class="grid">
                <input type="text" 
                       x-model="newTask" 
                       @keyup.enter="addItem()" 
                       placeholder="What needs to be done?">
                <button @click="addItem()" :disabled="!newTask.trim()">Add</button>
              </div>
            </header>

            <ul style="list-style: none; padding: 0;">
              <template x-for="(todo, index) in todos" :key="index">
                <li style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                  <input type="checkbox" x-model="todo.completed">
                  
                  <span :class="todo.completed ? 'text-muted' : ''" 
                        :style="todo.completed ? 'text-decoration: line-through; opacity: 0.5' : ''"
                        x-text="todo.text" 
                        style="flex-grow: 1;">
                  </span>

                  <button class="outline secondary" 
                          style="padding: 2px 10px; margin: 0;"
                          @click="removeItem(index)">
                    &times;
                  </button>
                </li>
              </template>
            </ul>

            <footer x-show="todos.length > 0" style="display: flex; justify-content: space-between; align-items: center;">
              <small>
                <span x-text="remainingCount()"></span> items left
              </small>
              <button class="outline contrast" 
                      style="font-size: 0.7rem; padding: 2px 8px;"
                      x-show="todos.some(t => t.completed)"
                      @click="clearCompleted()">
                Clear Completed
              </button>
            </footer>

            <p x-show="todos.length === 0" style="text-align: center; color: gray;">
              All caught up! 🎉
            </p>
          </article>

          <script>
            function todoApp() {
              return {
                newTask: '',
                // We use localStorage so your tasks stay put even if you refresh!
                todos: JSON.parse(localStorage.getItem('ts-todos') || '[]'),
                
                init() {
                  // Watch for changes and save to localStorage
                  this.$watch('todos', (val) => {
                    localStorage.setItem('ts-todos', JSON.stringify(val));
                  });
                },

                addItem() {
                  if (this.newTask.trim() === '') return;
                  this.todos.push({
                    text: this.newTask,
                    completed: false
                  });
                  this.newTask = '';
                },

                removeItem(index) {
                  this.todos.splice(index, 1);
                },

                remainingCount() {
                  return this.todos.filter(t => !t.completed).length;
                },

                clearCompleted() {
                  this.todos = this.todos.filter(t => !t.completed);
                }
              }
            }
          </script>
        </template>
        <template path="/reef" title="ReefJS">
          <div id="reef-app"></div>
          <button onclick="data.greeting = 'Hi'">Greeting to "Hi"</button>
          <button onclick="data.name = 'Universe'">Name to "Universe"</button>
          <script>
            let {signal, component} = reef;

            let data = signal({
	            greeting: 'Hello',
	            name: 'World'
            });

            function template () {
	            let {greeting, name} = data;
	            return `<p>${greeting}, ${name}!</p>`;
            }

            component('#reef-app', template);
          </script>
        </template>
      </template>

      <template id="ts-layout">
        <header class="container">
          <nav>
            <ul><li><strong>{{ title }}</strong></li></ul>
            <ul>
              <li><a href="/">Home</a></li>
              <li><a href="/users">Users</a></li>
              <li><a href="/hello/Visitor">Say Hello</a></li>
              <li><a href="/counter/2">Counter</a></li>
              <li><a href="/todo">Todo</a></li>
              <li><a href="/reef">Reef</a></li>
              <li><a href="https://github.com/rodezee/template-switch">Github</a></li>
            </ul>
          </nav>
        </header>
        
        <main class="container">
          {{ content }}
        </main>

        <footer class="container">
          <hr>
          <small>Built with <strong>Template Switch</strong> • Styled with Pico.css</small>
        </footer>
      </template>
    </template-switch>
  </body>
</html>
