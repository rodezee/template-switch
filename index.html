<!doctype html>
<html lang="en">
  <head>
    <title>Template Switch</title>
    <link rel="icon" type="image/svg+xml" 
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23000'><path d='M2.01 21L23 12 2.01 3 2 10l15 2-15 2z'/></svg>">
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="color-scheme" content="light dark">
    <link rel="stylesheet" href="//unpkg.com/@picocss/pico">
    <script type="module" src="/template-switch.js"></script>
    <script src="//unpkg.com/alpinejs" defer></script>
    <script src="https://cdn.jsdelivr.net/npm/petite-vue@0.4.1/dist/petite-vue.iife.min.js"></script>
  </head>
  <body>
    <template-switch>
      <template id="ts-routes">
        <template path="/" title="Home">
          <hgroup>
            <h1>Welcome</h1>
            <p>This is a zero-dependency template router.</p>
          </hgroup>
          <hr>
          <p>This router uses native browser templates to define routes and layouts without a complex build step.</p>
          <p>To see this at work, click through the menu.</p>
          <hr>
          <hgroup>
            <h1>How it works!</h1>
            <br>
            <a href="https://github.com/rodezee/template-switch">Read This</a>
          </hgroup>
        </template>

        <template path="/hello/:name" title="Greeting">
          <article>
            <header>Personal Greeting</header>
            <h3>Hello, %{ name }%!</h3>
            <p>This page was generated by matching the <code>:name</code> parameter in the URL.</p>
            <footer><a href="/users">Back to Users</a></footer>
          </article>
        </template>

        <template path="/profile/:firstname/:lastname" title="User Profile">
          <article>
            <nav aria-label="breadcrumb">
              <ul>
                <li><a href="/">Home</a></li>
                <li>User Profile</li>
              </ul>
            </nav>
            <h2>Profile: %{firstname}% %{lastname}%</h2>
            <div class="grid">
              <mark>Role: Administrator</mark>
              <mark>Status: Active</mark>
            </div>
          </article>
        </template>

        <template path="/users" title="User Directory">
          <h2>Our Team</h2>
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>John Doe</td>
                <td><a href="/profile/John/Doe">View Profile</a></td>
              </tr>
              <tr>
                <td>Piere Lun</td>
                <td><a href="/profile/Piere/Lun">View Profile</a></td>
              </tr>
              <tr>
                <td>Jane Smith</td>
                <td><a href="/hello/Jane">Say Hi</a></td>
              </tr>
            </tbody>
          </table>
        </template>
        <template path="/counter/:start" title="Counter">
          <article>
            <header>Counter started at %{start}%</header>
            <p>Count: <strong id="display-%{start}%">%{start}%</strong></p>
            <button id="btn-%{start}%">Increment</button>
          </article>

          <script>
            // Because we use unique IDs like 'btn-%{start}%', 
            // multiple counters won't clash!
            (function() {
              let count = parseInt("%{start}%"); // Hardcoded magic!
              const display = document.getElementById("display-%{start}%");
              const btn = document.getElementById("btn-%{start}%");

              btn.onclick = () => {
                count++;
                display.textContent = count;
              };
            })();
          </script>
        </template>
        <template path="/todo-alpine" title="Todo Alpine">
          <article x-data="todoApp()">
            <header>
              <h3>Alpine.js Todo</h3>
              <div class="grid">
                <input type="text" x-model="newTask" @keyup.enter="addItem()" placeholder="What needs doing?">
                <button @click="addItem()">Add</button>
              </div>
            </header>

            <ul style="list-style: none; padding: 0;">
              <template x-for="(todo, index) in todos" :key="index">
                <li style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                  <input type="checkbox" x-model="todo.completed">
                  <span :style="todo.completed ? 'text-decoration: line-through; opacity: 0.5' : ''" 
                        style="flex-grow: 1;" x-text="todo.text"></span>
                  <button class="outline secondary" style="padding: 2px 10px; margin: 0;" @click="removeItem(index)">&times;</button>
                </li>
              </template>
            </ul>

            <footer x-show="todos.length > 0" style="display: flex; justify-content: space-between; align-items: center;">
              <small><span x-text="remainingCount()"></span> items left</small>
              <button class="outline contrast" style="font-size: 0.7rem; padding: 2px 8px;"
                      x-show="todos.some(t => t.completed)" @click="clearCompleted()">
                Clear Completed
              </button>
            </footer>
          </article>

          <script>
            function todoApp() {
              return {
                newTask: '',
                todos: JSON.parse(localStorage.getItem('ts-todos') || '[]'),
                init() {
                  this.$watch('todos', (val) => localStorage.setItem('ts-todos', JSON.stringify(val)));
                },
                addItem() {
                  if (!this.newTask.trim()) return;
                  this.todos.push({ text: this.newTask, completed: false });
                  this.newTask = '';
                },
                removeItem(index) { this.todos.splice(index, 1); },
                remainingCount() { return this.todos.filter(t => !t.completed).length; },
                clearCompleted() { this.todos = this.todos.filter(t => !t.completed); }
              }
            }
          </script>
        </template>

        <template path="/todo-petite" title="Petite Todo">
          <article v-scope="TodoApp()">
            <header>
              <h3>Petite-Vue Todo</h3>
              <div class="grid">
                <input type="text" v-model="newTask" @keyup.enter="addItem()" placeholder="What's next?">
                <button @click="addItem()">Add</button>
              </div>
            </header>

            <ul style="list-style: none; padding: 0;">
              <li v-for="(todo, index) in todos" :key="index" style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                <input type="checkbox" v-model="todo.completed" @change="save()">
                <span :style="todo.completed ? 'text-decoration: line-through; opacity: 0.5' : ''" style="flex-grow: 1;">
                  {{ todo.text }}
                </span>
                <button class="outline secondary" style="padding: 2px 10px; margin: 0;" @click="removeItem(index)">&times;</button>
              </li>
            </ul>

            <footer v-if="todos.length > 0" style="display: flex; justify-content: space-between; align-items: center;">
              <small>{{ remaining }} items left</small>
              <button v-if="todos.some(t => t.completed)" class="outline contrast" style="font-size: 0.7rem; padding: 2px 8px;" @click="clearCompleted()">
                Clear Completed
              </button>
            </footer>
          </article>

          <script>
            const TodoApp = () => ({
              newTask: '',
              todos: JSON.parse(localStorage.getItem('petite-tasks') || '[]'),
              get remaining() { return this.todos.filter(t => !t.completed).length; },
              addItem() {
                if (!this.newTask.trim()) return;
                this.todos.push({ text: this.newTask, completed: false });
                this.newTask = '';
                this.save();
              },
              removeItem(index) { this.todos.splice(index, 1); this.save(); },
              clearCompleted() { this.todos = this.todos.filter(t => !t.completed); this.save(); },
              save() { localStorage.setItem('petite-tasks', JSON.stringify(this.todos)); }
            });
            PetiteVue.createApp({ TodoApp }).mount();
          </script>
        </template>
        <template path="/todo-js" title="JS Tasks">
          <article id="vanilla-app-container"></article>

          <script>
            (() => {
              // 1. Data Management
              const STORAGE_KEY = 'vanilla-tasks-v2';
              const save = (tasks) => localStorage.setItem(STORAGE_KEY, JSON.stringify(tasks));
              const load = () => JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');

              // 2. Actions (Attached to window so HTML strings can call them)
              window.vAdd = () => {
                const input = document.querySelector('#v-input');
                if (!input || !input.value.trim()) return;
                
                const tasks = load();
                tasks.push({ text: input.value, completed: false });
                save(tasks);
                render();
              };

              window.vToggle = (index) => {
                const tasks = load();
                tasks[index].completed = !tasks[index].completed;
                save(tasks);
                render();
              };

              window.vDelete = (index) => {
                const tasks = load();
                tasks.splice(index, 1);
                save(tasks);
                render();
              };

              window.vClear = () => {
                const tasks = load().filter(t => !t.completed);
                save(tasks);
                render();
              };

              // 3. The Render Engine
              const render = () => {
                const container = document.querySelector('#vanilla-app-container');
                if (!container) return;

                const tasks = load();
                const remaining = tasks.filter(t => !t.completed).length;
                const hasCompleted = tasks.some(t => t.completed);

                container.innerHTML = `
                  <header>
                    <h3>Vanilla Todo List</h3>
                    <div class="grid">
                      <input type="text" id="v-input" placeholder="What needs doing?" 
                             onkeyup="if(event.key === 'Enter') window.vAdd()">
                      <button onclick="window.vAdd()">Add</button>
                    </div>
                  </header>

                  <ul style="list-style: none; padding: 0;">
                    ${tasks.map((t, i) => `
                      <li style="display: flex; align-items: center; gap: 10px; margin-bottom: 10px;">
                        <input type="checkbox" ${t.completed ? 'checked' : ''} onchange="window.vToggle(${i})">
                        <span style="flex-grow: 1; ${t.completed ? 'text-decoration: line-through; opacity: 0.5' : ''}">
                          ${t.text}
                        </span>
                        <button class="outline secondary" style="padding: 2px 10px; margin: 0;" onclick="window.vDelete(${i})">&times;</button>
                      </li>
                    `).join('')}
                  </ul>

                  ${tasks.length > 0 ? `
                    <footer style="display: flex; justify-content: space-between; align-items: center; margin-top: 20px;">
                      <small>${remaining} items left</small>
                      ${hasCompleted ? `
                        <button class="outline contrast" style="font-size: 0.7rem; padding: 2px 8px;" onclick="window.vClear()">
                          Clear Completed
                        </button>
                      ` : ''}
                    </footer>
                  ` : '<p style="text-align: center; color: gray;">All caught up! 🎉</p>'}
                `;
                
                // Auto-focus input after render if it was active
                const input = document.querySelector('#v-input');
                if (input) input.focus();
              };

              // Initial Boot
              setTimeout(render, 50);
            })();
          </script>
        </template>
      </template>

      <template id="ts-layout">
        <header class="container">
          <nav>
            <ul>
              <li>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor">
                  <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
                <strong>%{ title }%</strong>
              </li>
            </ul>
            <ul>
              <li><a href="/">Home</a></li>
              <li><a href="/users">Users</a></li>
              <li><a href="/hello/Visitor">Say Hello</a></li>
              <li><a href="/counter/2">Counter</a></li>
              <li><a href="/todo-alpine">TodoAlpine</a></li>
              <li><a href="/todo-petite">TodoPetiteVue</a></li>
              <li><a href="/todo-js">TodoJS</a></li>
              <li><a href="https://github.com/rodezee/template-switch">Github</a></li>
            </ul>
          </nav>
        </header>
        
        <main class="container">
          %{ content }%
        </main>

        <footer class="container">
          <hr>
          <small>Built with <strong>Template Switch</strong> • Styled with Pico.css</small>
        </footer>
      </template>
    </template-switch>
  </body>
</html>
